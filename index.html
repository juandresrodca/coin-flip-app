<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Coin Flip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="container">
  <h1>🪙 Coin Flip</h1>

  <div class="controls">
    <div class="input-group">
      <label>What are you deciding with this toss?</label>
      <input type="text" id="decision" placeholder="e.g. Pizza vs Burger" maxlength="50">
    </div>

    <div style="display: flex; gap: 1rem;">
      <div class="input-group" style="flex: 1;">
        <label>Select Your Side:</label>
        <select id="userChoice">
          <option value="heads">Heads</option>
          <option value="tails">Tails</option>
        </select>
      </div>

      <div class="input-group" style="flex: 1;">
        <label>Total Tosses:</label>
        <input type="number" id="tries" value="1" min="1" max="11" step="2">
      </div>
    </div>

    <button id="mainBtn" onclick="startFlip()">Toss Coin</button>
  </div>

  <div class="coin-container">
    <div id="live-timer" style="position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; color: #94a3b8; font-family: monospace;"></div>
    <div id="coin">
      <div class="coin-side heads">
        <img src="coin-heads.png" alt="heads">
      </div>
      <div class="coin-side tails">
        <img src="coin-tails.png" alt="tails">
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden">
    <p id="decisionOutput" style="font-style: italic; color: #818cf8; margin-bottom: 0.5rem;"></p>
    <div id="resultText">Result: ?</div>
    <div class="stats">
      <p id="timeText"></p>
      <p id="remainingText"></p>
      <div id="finalSummary" class="hidden" style="margin-top: 1rem; font-weight: 600; font-size: 1.2rem;"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
